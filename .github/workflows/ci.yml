name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "VITE_FIREBASE_API_KEY=placeholder" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=placeholder" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=placeholder" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=placeholder" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=placeholder" >> .env
          echo "VITE_FIREBASE_APP_ID=placeholder" >> .env
          echo "VITE_GEMINI_API_KEY=placeholder" >> .env
          echo "VITE_GITHUB_CLIENT_ID=placeholder" >> .env

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1